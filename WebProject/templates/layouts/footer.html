</div> <!-- /.wrapper -->

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
document.getElementById('logoutBtn').addEventListener('click', function () {
  Swal.fire({
    title: 'Yakin ingin logout?',
    text: "Anda akan keluar dari sistem!",
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#3085d6',
    cancelButtonColor: '#d33',
    confirmButtonText: 'Ya, logout!',
    cancelButtonText: 'Batal'
  }).then((result) => {
    if (result.isConfirmed) {
      window.location.href = '/logout';
    }
  });
});
</script>

<script>
$(".btn-verif").click(function() {
    let id = $(this).data("id");

    Swal.fire({
        title: "Verifikasi Plat?",
        text: "Gerbang akan dibuka jika Anda melanjutkan!",
        icon: "warning",
        showCancelButton: true,
        confirmButtonText: "Ya, buka gerbang!",
    }).then((result) => {
        if (result.isConfirmed) {
            $.post("/verifikasi/" + id, function(response) {
                if (response.success) {
                    Swal.fire("Berhasil!", "Gerbang dibuka.", "success");
                    setTimeout(() => location.reload(), 1200);
                }
            });
        }
    });
});
</script>


</body>
</html>
